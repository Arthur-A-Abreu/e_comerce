{% extends "account/base_entrance.html" %}
{% load i18n %}

{% block page_title %}Senha Redefinida!{% endblock %}

{% block auth_content %}
    <div style="text-align:center;padding:10px 0;">
        <div style="width:80px;height:80px;background:var(--green-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px;color:var(--green-tag);">
            <i class="fa-solid fa-shield-check"></i>
        </div>
        <h2 style="font-size:20px;font-weight:700;color:var(--dark-navy);margin-bottom:10px;">Senha redefinida com sucesso!</h2>
        <p style="color:var(--text-light);font-size:14px;margin-bottom:28px;">
            Sua nova senha foi definida. Você já pode entrar na sua conta.
        </p>
        <a href="{% url 'account_login' %}" style="display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:linear-gradient(135deg,var(--ocean-blue),var(--mid-navy));color:var(--white);border-radius:8px;font-weight:700;font-family:var(--font-family);font-size:15px;text-decoration:none;">
            <i class="fa-solid fa-right-to-bracket"></i> Entrar agora
        </a>
    </div>
{% endblock %}
